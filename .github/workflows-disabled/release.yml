name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release as (e.g. v0.2.0). Required when running manually."
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest        # Apple Silicon GHA runner
          - target: x86_64-apple-darwin
            runner: macos-13            # Intel GHA runner — native, no cross-compile
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            apt: ""
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            apt: "gcc-aarch64-linux-gnu"
            linker: aarch64-linux-gnu-gcc
            cc: aarch64-linux-gnu-gcc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compile toolchain (Linux ARM64)
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.cc }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail
          stage="rr-${{ matrix.target }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/rr" "$stage/"
          cp -r skills "$stage/"
          cp README.md "$stage/" 2>/dev/null || true
          cp docs/formatting-guide.md "$stage/" 2>/dev/null || true

          archive="$stage.tar.gz"
          tar -czf "$archive" "$stage"

          # SHA-256 for the installer to verify.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "$archive.sha256"
          else
            shasum -a 256 "$archive" > "$archive.sha256"
          fi

          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "checksum=$archive.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rr-${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build combined checksums file
        run: |
          set -euo pipefail
          cd dist
          : > SHA256SUMS
          for f in *.sha256; do
            cat "$f" >> SHA256SUMS
          done
          ls -la

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.ref }}
          name: rr ${{ steps.tag.outputs.ref }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
